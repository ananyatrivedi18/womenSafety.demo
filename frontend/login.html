<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In — SheShield</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="blob one"></div>
  <div class="blob two"></div>

  <header class="topbar">
    <a class="brand" href="index.html" style="color: inherit;">
      <span class="logo">🛡️</span> SheShield
    </a>
  </header>

  <main class="auth-wrap">
    <div class="glass auth-card">
      <h2>Welcome back</h2>
      <p class="sub">Log in to access your safety dashboard.</p>

      <!-- The form submit is handled by js/auth.js -->
      <form id="loginForm" novalidate>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Your password" required />
        </div>
        <button type="submit" class="btn" style="width: 100%;">Log In</button>
      </form>

      <p class="switch">New here? <a href="register.html">Create an account</a></p>
    </div>
  </main>

  <!-- common.js first (defines helpers), then auth.js (uses them) -->
  <script src="js/common.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
