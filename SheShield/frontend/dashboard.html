<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — SheShield</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="blob one"></div>
  <div class="blob two"></div>

  <div class="app">
    <!-- ===== Sidebar (repeated on every app page) ===== -->
    <aside class="sidebar">
      <div class="brand"><span class="logo">🛡️</span> SheShield</div>
      <a class="side-link active" href="dashboard.html"><span class="ico">📊</span> Dashboard</a>
      <a class="side-link" href="contacts.html"><span class="ico">👥</span> Contacts</a>
      <a class="side-link" href="sos.html"><span class="ico">🆘</span> SOS</a>
      <a class="side-link" href="tips.html"><span class="ico">💡</span> Safety Tips</a>
      <div class="spacer"></div>
      <a class="side-link" href="#" id="logoutBtn"><span class="ico">🚪</span> Log Out</a>
    </aside>

    <!-- ===== Main content ===== -->
    <main class="content">
      <!-- Mobile-only top bar with hamburger to open the sidebar -->
      <div class="mobile-bar">
        <div class="brand" style="font-size: 1.2rem;"><span class="logo">🛡️</span> SheShield</div>
        <button class="hamburger" id="hamburger">☰</button>
      </div>

      <!-- Welcome card (filled by js/dashboard.js) -->
      <div class="glass welcome-card">
        <div class="avatar" id="avatar">?</div>
        <div>
          <h2>Hello, <span id="welcomeName">…</span> 👋</h2>
          <p id="welcomeSub">Loading your dashboard…</p>
        </div>
      </div>

      <!-- Stat cards -->
      <div class="stats-grid">
        <div class="glass stat-card">
          <div class="ico">👥</div>
          <div class="num" id="contactCount">0</div>
          <div class="lbl">Emergency Contacts</div>
        </div>
        <div class="glass stat-card">
          <div class="ico">🆘</div>
          <div class="num" id="sosCount">0</div>
          <div class="lbl">SOS Alerts Sent</div>
        </div>
        <div class="glass stat-card">
          <div class="ico">📅</div>
          <div class="num" id="memberDays">0</div>
          <div class="lbl">Days as a Member</div>
        </div>
      </div>

      <!-- Account details -->
      <div class="glass detail-list">
        <h3>Your Account</h3>
        <div class="detail-row"><span>Name</span><span id="detailName">—</span></div>
        <div class="detail-row"><span>Email</span><span id="detailEmail">—</span></div>
        <div class="detail-row"><span>Phone</span><span id="detailPhone">—</span></div>
        <div class="detail-row"><span>Joined</span><span id="detailJoined">—</span></div>
      </div>
    </main>
  </div>

  <script src="js/common.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
